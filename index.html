<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب الكتب الدراسية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>مكتبة الكتب الدراسية</h1>
  <p>اختار الصف والكتب، والطلب بيتجهز خلال 10 إلى 15 يوم.</p>
</header>

<main>
  <section class="card">
    <h2>اختار الصف الدراسي</h2>
    <select id="gradeSelect">
      <option value="">-- اختار الصف --</option>
    </select>
  </section>

  <section class="card">
    <h2>الكتب المتاحة</h2>
    <div id="booksList"></div>
  </section>

  <section class="card invoice">
    <h2>الفاتورة</h2>
    <div id="invoice"></div>
    <h3 id="total">الإجمالي: 0 جنيه</h3>
  </section>

  <section class="card">
    <h2>بيانات العميل</h2>

    <input id="customerName" placeholder="اسم العميل" />
    <input id="phone" placeholder="رقم التليفون / واتساب" />
    <textarea id="notes" placeholder="ملاحظات"></textarea>

    <p class="notice">مدة تجهيز الطلب من 10 إلى 15 يوم، ولما يجهز هنكلمك.</p>

    <button onclick="submitOrder()">تأكيد الطلب</button>
    <p id="message"></p>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
