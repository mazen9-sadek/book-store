<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب الكتب الدراسية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="hero">
  <div>
    <h1>📚 طلب الكتب الدراسية</h1>
    <p>اختار الصف، حدّد الكتب والكميات، وسيتم التواصل معك عند جاهزية الطلب.</p>
  </div>
  <a class="whatsapp" href="https://wa.me/201554596691" target="_blank">تواصل واتساب</a>
</header>

<main class="layout">

  <section class="content">
    <h2>اختر الصف الدراسي</h2>
    <div id="grades" class="grades"></div>

    <div class="search-box">
      <input id="searchInput" type="text" placeholder="🔍 ابحث عن كتاب..." />
    </div>

    <h2 id="booksTitle">الكتب المتاحة</h2>
    <div id="booksList" class="books"></div>
  </section>

  <aside class="sidebar">
    <section class="invoice card">
      <h2>🧾 الفاتورة</h2>
      <div id="invoice"></div>
      <h3 id="total">الإجمالي: 0 جنيه</h3>
    </section>

    <section class="customer card">
      <h2>👤 بيانات العميل</h2>
      <input id="customerName" placeholder="اسم العميل" />
      <input id="phone" placeholder="رقم واتساب" />
      <textarea id="notes" placeholder="ملاحظات"></textarea>

      <p class="notice">
        ⏳ مدة تجهيز الطلب من 10 إلى 15 يوم، وسيتم التواصل معكم عند جاهزية الطلب.
      </p>

      <button onclick="submitOrder()">تأكيد الطلب</button>
      <p id="message"></p>
    </section>
  </aside>

</main>

<script src="script.js"></script>
</body>
</html>
